name = "arrendiademo-worker"
main = "scr/index.ts"
compatibility_date = "2024-07-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding     = "DB"
database_name = "arrendiademo-db"
database_id   = "PENDIENTE"

[[r2_buckets]]
binding     = "BUCKET"
bucket_name = "arrendiademo-files"

[vars]
ENVIRONMENT = "demo"

[triggers]
crons = ["0 6 1 * *"]
